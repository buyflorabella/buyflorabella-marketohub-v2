# buyflorabella — HTTPS reverse proxy for Flask backend
# Proxies to Gunicorn on port 20221, managed by buyflorabella.service (systemd).
# Cert: 010-buyflorabella

<VirtualHost *:443>
    ServerName admin.buyflorabella.boardmansgame.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/010-buyflorabella/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/010-buyflorabella/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyPass        "/" "http://127.0.0.1:20221/"
    ProxyPassReverse "/" "http://127.0.0.1:20221/"

    ErrorLog  /var/log/httpd/buyflorabella-admin_error.log
    CustomLog /var/log/httpd/buyflorabella-admin_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName admin.buyflorabella.boardmansgame.com
    RewriteEngine on
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
