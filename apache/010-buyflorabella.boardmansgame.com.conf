# buyflorabella — HTTPS static SPA (production React/Hydrogen build)
# Serves compiled build from prod/frontend/build/ via DocumentRoot.
# FallbackResource routes all unknown paths to index.html for React Router.
#
# Cert prereq: buyflorabella-prod cert must cover buyflorabella.boardmansgame.com
#              and admin.buyflorabella.boardmansgame.com
# Issue once:
#   sudo certbot certonly --apache --cert-name buyflorabella-prod \
#     -d buyflorabella.boardmansgame.com \
#     -d admin.buyflorabella.boardmansgame.com
#
# Deploy:
#   sudo ln -s /var/www/html/buyflorabella/dev/apache/010-buyflorabella.boardmansgame.com.conf \
#              /etc/httpd/conf.d/
#   sudo httpd -t && sudo systemctl reload httpd

<VirtualHost *:443>
    ServerName buyflorabella.boardmansgame.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/buyflorabella-prod/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/buyflorabella-prod/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    DocumentRoot /var/www/html/buyflorabella/prod/frontend/build

    <Directory /var/www/html/buyflorabella/prod/frontend/build>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ErrorLog  /var/log/httpd/buyflorabella-spa_error.log
    CustomLog /var/log/httpd/buyflorabella-spa_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName buyflorabella.boardmansgame.com
    RewriteEngine on
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
