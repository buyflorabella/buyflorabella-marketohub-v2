# buyflorabella — HTTPS reverse proxy for Vite dev server in prod worktree
# Proxies to npm run dev on port 20220, started via:
#   cd /var/www/html/buyflorabella/prod && ./script/manage --frontend
# Cert: 010-buyflorabella (already covers this domain)

<VirtualHost *:443>
    ServerName frontend.buyflorabella.boardmansgame.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/010-buyflorabella/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/010-buyflorabella/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyPass        "/" "http://127.0.0.1:20220/"
    ProxyPassReverse "/" "http://127.0.0.1:20220/"

    ErrorLog  /var/log/httpd/buyflorabella-frontend_error.log
    CustomLog /var/log/httpd/buyflorabella-frontend_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName frontend.buyflorabella.boardmansgame.com
    RewriteEngine on
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
