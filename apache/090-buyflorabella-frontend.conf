# buyflorabella — HTTPS reverse proxy for Vite dev server in dev worktree
# Proxies to npm run dev on port 15220, started via:
#   cd /var/www/html/buyflorabella/dev && ./script/manage --frontend
# Cert: 090-buyflorabella

<VirtualHost *:443>
    ServerName frontend.dev.buyflorabella.boardmansgame.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/090-buyflorabella/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/090-buyflorabella/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyPass        "/" "http://127.0.0.1:15220/"
    ProxyPassReverse "/" "http://127.0.0.1:15220/"

    ErrorLog  /var/log/httpd/buyflorabella-dev-frontend_error.log
    CustomLog /var/log/httpd/buyflorabella-dev-frontend_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName frontend.dev.buyflorabella.boardmansgame.com
    RewriteEngine on
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
