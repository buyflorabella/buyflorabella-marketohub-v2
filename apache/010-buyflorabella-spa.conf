# buyflorabella — HTTPS static SPA
# Serves the compiled React build from prod/frontend/build/ as a DocumentRoot.
# FallbackResource sends all unknown paths to index.html for React Router.
# Build output: cd prod/frontend && npm run build
#
# Cert: 010-buyflorabella (covers buyflorabella.boardmansgame.com, admin, api, frontend)
# Managed by Ansible (site-management). Copy to conf.d or let Ansible deploy.

<VirtualHost *:443>
    ServerName buyflorabella.boardmansgame.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/010-buyflorabella/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/010-buyflorabella/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    DocumentRoot /var/www/html/buyflorabella/prod/frontend/build

    <Directory /var/www/html/buyflorabella/prod/frontend/build>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ErrorLog  /var/log/httpd/buyflorabella-spa_error.log
    CustomLog /var/log/httpd/buyflorabella-spa_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName buyflorabella.boardmansgame.com
    RewriteEngine on
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
