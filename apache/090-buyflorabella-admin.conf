# buyflorabella — HTTPS reverse proxy for Flask backend in dev worktree
# Proxies to Gunicorn/Flask on port 15221, started via:
#   cd /var/www/html/buyflorabella/dev && ./script/manage --backend
# Cert: 090-buyflorabella

<VirtualHost *:443>
    ServerName admin.dev.buyflorabella.boardmansgame.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/090-buyflorabella/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/090-buyflorabella/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyPass        "/" "http://127.0.0.1:15221/"
    ProxyPassReverse "/" "http://127.0.0.1:15221/"

    ErrorLog  /var/log/httpd/buyflorabella-dev-admin_error.log
    CustomLog /var/log/httpd/buyflorabella-dev-admin_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName admin.dev.buyflorabella.boardmansgame.com
    RewriteEngine on
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
