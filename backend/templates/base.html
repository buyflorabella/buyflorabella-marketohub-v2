<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Platform Template{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('pages.static', filename='css/app.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="/" class="nav-brand">Platform Template</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/api/docs" target="_blank" rel="noopener">API Docs</a>
                <a href="/admin/login">Admin Login</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
