<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Platform Template</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body style="background:#f5f5f5;">
<div class="admin-login-wrap">
    <h1>Admin login</h1>
    <p class="subtitle">Platform Template admin panel</p>

    <div id="error-msg" class="alert alert-error" style="display:none;"></div>

    <div class="card">
        <div class="form-row">
            <label for="email">Email</label>
            <input type="email" id="email" autocomplete="username" autofocus>
        </div>
        <div class="form-row">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
    </div>
</div>

<script>
function doLogin() {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var btn      = document.getElementById('login-btn');
    var errEl    = document.getElementById('error-msg');

    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
        if (res.ok && res.data.success) {
            window.location.href = '/admin/';
        } else {
            errEl.textContent = res.data.message || 'Invalid credentials.';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign in';
        }
    })
    .catch(function() {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
    });
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
